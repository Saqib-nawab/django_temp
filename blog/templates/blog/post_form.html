<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% if post %}Edit Post{% else %}New Post{% endif %}</title>
</head>
<body>
    <a href="{% url 'post_list' %}">&larr; Back to all posts</a>
    <h1>{% if post %}Edit Post{% else %}New Post{% endif %}</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save</button>
    </form>
</body>
</html>
