<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ post.title }}</title>
</head>
<body>
    <a href="{% url 'post_list' %}">&larr; Back to all posts</a>
    <h1>{{ post.title }}</h1>
    <p><small>{{ post.created_at }}</small></p>
    <p>{{ post.content }}</p>
    <p>
        <a href="{% url 'post_update' post.id %}">Edit</a> |
        <a href="{% url 'post_delete' post.id %}">Delete</a>
    </p>
</body>
</html>
