{% extends "blog/base.html" %}

{% block title %}Log In{% endblock %}

{% block content %}
    <h1 class="text-3xl font-bold text-gray-900 mb-6">Log In</h1>

    <form method="post" class="max-w-sm bg-white border border-gray-200 rounded-lg p-6 space-y-5">
        {% csrf_token %}

        {% for field in form %}
            <div>
                <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700">
                    {{ field.label }}
                </label>
                {{ field }}
                {% if field.errors %}
                    <p class="mt-1 text-sm text-red-600">{{ field.errors|join:", " }}</p>
                {% endif %}
            </div>
        {% endfor %}

        <button type="submit"
                class="px-4 py-2 text-sm font-medium rounded-md bg-blue-600 text-white hover:bg-blue-700 transition">
            Log In
        </button>

        <p class="text-sm text-gray-600">
            No account? <a href="{% url 'signup' %}" class="text-blue-600 hover:underline">Sign up</a>
        </p>
    </form>
{% endblock %}
